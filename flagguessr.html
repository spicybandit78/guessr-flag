<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FlagGuessr</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --navy: #0d1526;
  --panel: #111827;
  --border: #1e2d47;
  --border2: #2a3f5f;
  --blue: #3b82f6;
  --blue-dim: #1e3a5f;
  --cyan: #06b6d4;
  --text: #e2e8f0;
  --muted: #64748b;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; background: var(--bg); font-family: 'IBM Plex Sans', sans-serif; color: var(--text); overflow: hidden; -webkit-tap-highlight-color: transparent; }

/* grid bg */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

.app { display: flex; flex-direction: column; height: 100%; position: relative; z-index: 1; }

/* HEADER */
header {
  flex-shrink: 0; height: 52px;
  background: var(--navy); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
}
.logo { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; color: var(--cyan); letter-spacing: 1px; }
.logo span { color: var(--text); }
.hud { display: flex; align-items: center; gap: 20px; }
.hud-item { text-align: right; }
.hud-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.hud-val { font-family: 'IBM Plex Mono', monospace; font-size: 20px; color: var(--cyan); line-height: 1; }
.pips { display: flex; gap: 5px; align-items: center; }
.pip { width: 8px; height: 8px; border-radius: 1px; background: var(--border); border: 1px solid var(--border2); transition: all .3s; }
.pip.done { background: var(--blue-dim); border-color: var(--blue); }
.pip.cur  { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

/* MAIN CONTENT */
#main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px; gap: 20px; min-height: 0; overflow-y: auto;
}

/* REVEAL STATUS */
#reveal-status {
  display: flex; align-items: center; gap: 12px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
}
.reveal-bar { display: flex; gap: 4px; }
.reveal-seg {
  width: 28px; height: 6px; border-radius: 2px;
  background: var(--border); border: 1px solid var(--border2);
  transition: all .3s;
}
.reveal-seg.lit { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 4px var(--cyan); }
.multiplier-badge {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  padding: 3px 8px; border-radius: 3px;
  background: rgba(245,158,11,.12); color: var(--yellow);
  border: 1px solid rgba(245,158,11,.3);
}

/* FLAG CONTAINER */
#flag-container {
  position: relative; width: 100%; max-width: 420px;
  border: 1px solid var(--border2);
  border-radius: 4px; overflow: hidden;
  box-shadow: 0 0 40px rgba(6,182,212,.08), 0 8px 32px rgba(0,0,0,.4);
  background: #1a1a2e;
  aspect-ratio: 3/2;
}

/* The flag itself */
#flag-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  display: block;
}

/* Reveal overlay — covers portions of the flag */
#reveal-overlay {
  position: absolute; inset: 0;
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
  pointer-events: none;
}
.cover-cell {
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace; font-size: 22px; color: var(--border2);
  transition: opacity .6s ease;
  border: 1px solid var(--border);
}
.cover-cell.revealed { opacity: 0; pointer-events: none; }

/* Reveal button */
#reveal-btn {
  width: 100%; max-width: 420px;
  background: transparent; color: var(--blue);
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 2px;
  border: 1px solid var(--blue-dim); padding: 10px;
  border-radius: 4px; cursor: pointer; transition: all .2s;
  text-transform: uppercase;
}
#reveal-btn:hover { background: rgba(59,130,246,.08); border-color: var(--blue); }
#reveal-btn:disabled { opacity: .3; cursor: not-allowed; }
#reveal-btn.fully-revealed { display: none; }

/* ANSWER INPUT */
#answer-section {
  width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px;
}
#answer-hint {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  letter-spacing: 1px; color: var(--muted); text-transform: uppercase;
  text-align: center;
}

/* Country grid */
#country-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; max-height: 240px; overflow-y: auto;
}
#country-grid::-webkit-scrollbar { width: 4px; }
#country-grid::-webkit-scrollbar-track { background: var(--border); }
#country-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.country-btn {
  background: var(--panel); border: 1px solid var(--border);
  color: var(--text); font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px; padding: 10px 12px; border-radius: 4px;
  cursor: pointer; text-align: left; transition: all .15s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.country-btn:hover { background: var(--border); border-color: var(--blue); color: var(--cyan); }
.country-btn.correct { background: rgba(16,185,129,.12); border-color: var(--green); color: var(--green); }
.country-btn.wrong   { background: rgba(239,68,68,.1);   border-color: var(--red);   color: var(--red);   opacity: .5; }
.country-btn:disabled { cursor: not-allowed; }

/* Search filter */
#country-search {
  width: 100%; background: var(--panel); border: 1px solid var(--border);
  color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  padding: 10px 14px; border-radius: 4px; outline: none;
  transition: border-color .2s;
}
#country-search::placeholder { color: var(--muted); }
#country-search:focus { border-color: var(--blue); }

/* RESULT CARD */
#result-card {
  display: none; width: 100%; max-width: 420px;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px; text-align: center;
}
#result-card.show { display: block; }
.result-flag-preview {
  width: 120px; height: 80px; margin: 0 auto 14px;
  border: 1px solid var(--border2); border-radius: 3px; overflow: hidden;
}
.result-flag-preview svg { width: 100%; height: 100%; display: block; }
.res-country { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.res-outcome { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2px; margin-bottom: 12px; }
.res-outcome.correct { color: var(--green); }
.res-outcome.wrong   { color: var(--red); }
.res-pts { font-family: 'IBM Plex Mono', monospace; font-size: 48px; font-weight: 600; color: var(--cyan); line-height: 1; }
.res-pts-lbl { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
.res-detail { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.res-detail span { color: var(--text); }
.btn-next {
  width: 100%; background: var(--cyan); color: var(--bg);
  font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; letter-spacing: 2px;
  border: none; padding: 13px; border-radius: 4px; cursor: pointer;
  text-transform: uppercase;
}
.btn-next:active { opacity: .85; }

/* FINAL SCORE */
#final-screen {
  display: none; width: 100%; max-width: 420px; text-align: center;
}
#final-screen.show { display: block; }
.final-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.final-score { font-family: 'IBM Plex Mono', monospace; font-size: 80px; font-weight: 600; color: var(--cyan); line-height: 1; }
.final-max { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
.final-grade { font-size: 14px; padding: 6px 16px; border-radius: 20px; display: inline-block; margin-bottom: 20px; }
.fg-perfect { background: rgba(16,185,129,.12); color: var(--green); border: 1px solid rgba(16,185,129,.3); }
.fg-great   { background: rgba(6,182,212,.12);   color: var(--cyan);  border: 1px solid rgba(6,182,212,.3); }
.fg-ok      { background: rgba(245,158,11,.12);  color: var(--yellow);border: 1px solid rgba(245,158,11,.3); }
.fg-miss    { background: rgba(239,68,68,.1);    color: var(--red);   border: 1px solid rgba(239,68,68,.3); }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">Flag<span>Guessr</span></div>
  <div class="hud">
    <div class="pips" id="pips"></div>
    <div class="hud-item">
      <div class="hud-lbl">Score</div>
      <div class="hud-val" id="hud-score">0</div>
    </div>
  </div>
</header>

<div id="main">

  <div id="reveal-status">
    <span id="reveal-label">Revealed:</span>
    <div class="reveal-bar" id="reveal-bar"></div>
    <div class="multiplier-badge" id="mult-badge">×4</div>
  </div>

  <div id="flag-container">
    <svg id="flag-svg" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="reveal-overlay">
      <div class="cover-cell" id="cell-0">?</div>
      <div class="cover-cell" id="cell-1">?</div>
      <div class="cover-cell" id="cell-2">?</div>
      <div class="cover-cell" id="cell-3">?</div>
    </div>
  </div>

  <button id="reveal-btn" onclick="revealNext()">▼ Reveal more flag</button>

  <div id="answer-section">
    <div id="answer-hint">Which country is this flag?</div>
    <input type="text" id="country-search" placeholder="Search countries…" oninput="filterCountries(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    <div id="country-grid"></div>
  </div>

  <div id="result-card">
    <div class="result-flag-preview" id="res-flag-preview"></div>
    <div class="res-country" id="res-country"></div>
    <div class="res-outcome" id="res-outcome"></div>
    <div class="res-pts" id="res-pts">0</div>
    <div class="res-pts-lbl">points</div>
    <div class="res-detail" id="res-detail"></div>
    <button class="btn-next" id="btn-next" onclick="nextRound()">Next Flag →</button>
  </div>

  <div id="final-screen">
    <div class="final-title">Mission Complete</div>
    <div class="final-score" id="final-score">0</div>
    <div class="final-max" id="final-max">out of 0 possible</div>
    <div class="final-grade" id="final-grade"></div>
    <button class="btn-next" onclick="location.reload()">↺ Play Again</button>
  </div>

</div><!-- #main -->

// All country names for the selection grid
const ALL_COUNTRIES = FLAGS.map(f => f.name).sort();

// ─────────────────────────────────────────────
// GAME CONFIG
// ─────────────────────────────────────────────
const TOTAL = 5;
// Reveal stages: how many quadrants are visible at each stage
// 0 revealed = multiplier 4, 1 = ×3, 2 = ×2, 3 = ×1, 4 (all) = ×0.5
const MULTIPLIERS = [4, 3, 2, 1, 0.5];
const BASE_SCORE = 1000;

let rounds = [], curr = 0, totalScore = 0;
let revealedCount = 0; // 0-4 quadrants revealed
let answered = false;
let currentFlag = null;

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildPips();
  buildRevealBar();
  startGame();
});

function startGame() {
  const shuffled = [...FLAGS].sort(() => Math.random() - .5);
  rounds = shuffled.slice(0, TOTAL);
  curr = 0; totalScore = 0;
  updateHUD();
  loadRound();
}

function buildPips() {
  const c = document.getElementById('pips'); c.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const p = document.createElement('div'); p.className='pip'+(i===0?' cur':''); p.id=`p${i}`; c.appendChild(p);
  }
}
function syncPips() {
  for (let i = 0; i < TOTAL; i++) {
    const p = document.getElementById(`p${i}`);
    if (p) p.className='pip'+(i<curr?' done':i===curr?' cur':'');
  }
}
function updateHUD() { document.getElementById('hud-score').textContent = totalScore.toLocaleString(); }

function buildRevealBar() {
  const bar = document.getElementById('reveal-bar'); bar.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const s = document.createElement('div'); s.className='reveal-seg'; s.id=`seg${i}`; bar.appendChild(s);
  }
}
function syncRevealBar() {
  for (let i = 0; i < 4; i++) {
    document.getElementById(`seg${i}`).classList.toggle('lit', i < revealedCount);
  }
  const mult = MULTIPLIERS[Math.min(revealedCount, MULTIPLIERS.length-1)];
  document.getElementById('mult-badge').textContent = `×${mult}`;
}

// ─────────────────────────────────────────────
// ROUND
// ─────────────────────────────────────────────
function loadRound() {
  currentFlag = rounds[curr];
  revealedCount = 0;
  answered = false;

  // Hide result, show answer section
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('answer-section').style.display = 'flex';
  document.getElementById('reveal-btn').disabled = false;
  document.getElementById('reveal-btn').classList.remove('fully-revealed');
  document.getElementById('reveal-btn').textContent = '▼ Reveal more flag';
  document.getElementById('country-search').value = '';

  // Reset covers
  for (let i = 0; i < 4; i++) {
    document.getElementById(`cell-${i}`).classList.remove('revealed');
    document.getElementById(`cell-${i}`).textContent = '?';
  }

  syncRevealBar();
  syncPips();
  updateHUD();

  // Draw flag
  document.getElementById('flag-svg').innerHTML = currentFlag.svg;

  // Build country grid
  buildCountryGrid(ALL_COUNTRIES);
}

function buildCountryGrid(countries) {
  const grid = document.getElementById('country-grid'); grid.innerHTML = '';
  countries.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'country-btn';
    btn.textContent = name;
    btn.onclick = () => submitGuess(name);
    grid.appendChild(btn);
  });
}

function filterCountries(query) {
  const q = query.toLowerCase().trim();
  const filtered = ALL_COUNTRIES.filter(n => n.toLowerCase().includes(q));
  buildCountryGrid(filtered);
}

// ─────────────────────────────────────────────
// REVEAL
// ─────────────────────────────────────────────
function revealNext() {
  if (revealedCount >= 4) return;
  document.getElementById(`cell-${revealedCount}`).classList.add('revealed');
  revealedCount++;
  syncRevealBar();

  if (revealedCount >= 4) {
    document.getElementById('reveal-btn').classList.add('fully-revealed');
  }
}

// ─────────────────────────────────────────────
// GUESS
// ─────────────────────────────────────────────
function submitGuess(name) {
  if (answered) return;
  answered = true;

  const correct = name === currentFlag.name;
  const mult = MULTIPLIERS[Math.min(revealedCount, MULTIPLIERS.length-1)];
  const pts = correct ? Math.round(BASE_SCORE * mult) : 0;
  totalScore += pts;

  // Reveal all covers
  for (let i = 0; i < 4; i++) document.getElementById(`cell-${i}`).classList.add('revealed');
  revealedCount = 4;
  syncRevealBar();

  // Highlight the button
  document.querySelectorAll('.country-btn').forEach(btn => {
    if (btn.textContent === currentFlag.name) btn.classList.add('correct');
    else if (btn.textContent === name && !correct) btn.classList.add('wrong');
    btn.disabled = true;
  });

  showResult(correct, pts, mult, name);
}

function showResult(correct, pts, mult, guessed) {
  document.getElementById('answer-section').style.display = 'none';
  document.getElementById('reveal-btn').classList.add('fully-revealed');

  const card = document.getElementById('result-card');
  document.getElementById('res-flag-preview').innerHTML = `<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">${currentFlag.svg}</svg>`;
  document.getElementById('res-country').textContent = currentFlag.name;

  const outcome = document.getElementById('res-outcome');
  if (correct) {
    outcome.textContent = '✓ CORRECT';
    outcome.className = 'res-outcome correct';
  } else {
    outcome.textContent = `✗ YOU GUESSED ${guessed.toUpperCase()}`;
    outcome.className = 'res-outcome wrong';
  }

  document.getElementById('res-pts').textContent = pts.toLocaleString();
  const revealStage = ['no reveals','1 quadrant','2 quadrants','3 quadrants','full flag'][revealedCount];
  document.getElementById('res-detail').innerHTML = correct
    ? `Identified with <span>${revealStage}</span> shown · <span>×${mult}</span> multiplier`
    : `The flag was fully revealed`;

  document.getElementById('btn-next').textContent = curr >= TOTAL-1 ? '🏆 Final Score' : 'Next Flag →';
  card.classList.add('show');
  updateHUD();
}

function nextRound() {
  curr++;
  if (curr >= TOTAL) { showFinal(); return; }
  loadRound();
}

function showFinal() {
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('answer-section').style.display = 'none';
  document.getElementById('flag-container').style.display = 'none';
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('reveal-status').style.display = 'none';

  const fs = document.getElementById('final-screen');
  document.getElementById('final-score').textContent = totalScore.toLocaleString();
  document.getElementById('final-max').textContent = `out of ${(TOTAL * BASE_SCORE * 4).toLocaleString()} possible`;

  const pct = totalScore / (TOTAL * BASE_SCORE * 4);
  const g = document.getElementById('final-grade');
  if (pct > .85)      { g.textContent='🏆 Vexillology Expert';  g.className='final-grade fg-perfect'; }
  else if (pct > .60) { g.textContent='🌍 Flag Enthusiast';     g.className='final-grade fg-great'; }
  else if (pct > .35) { g.textContent='🗺️ Casual Collector';   g.className='final-grade fg-ok'; }
  else                { g.textContent='📚 Keep Studying';        g.className='final-grade fg-miss'; }

  fs.classList.add('show');
}
</script>
